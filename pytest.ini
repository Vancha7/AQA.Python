#pytest.ini - это файл конфигурации для фреймворка тестирования pytest.

[pytest]

markers =
    smoke: smoke marker
    regress: regress marker

и т.д.
[pytest]
addopts =
    -sv
    --reruns=2
    --only-rerun TimeoutException
    --only-rerun HTTPSConnectionPool
    --only-rerun StaleElementReferenceException
    --only-rerun InvalidSessionIdException